<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday PAKKIIII ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:linear-gradient(180deg,#050816,#09122c);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.container{
text-align:center;
padding:30px;
}

h1{
font-size:38px;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:30px;
line-height:1.6;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:50px;
cursor:pointer;
background:#ff4d88;
color:white;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff2e72;
}

.hidden{
display:none;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:.2;}
50%{opacity:1;}
100%{opacity:.2;}
}

</style>

</head>

<body>

<div class="container" id="page1">

<h1>🎂 Happy Birthday PAKKIIII 🐥❤️</h1>

<p>
Hey My Kiddd...<br><br>

I made something only for you.<br>

Tap the button below to unlock your birthday surprise.
</p>

<button onclick="nextPage()">Unlock My Heart ❤️</button>

</div>

<div class="container hidden" id="page2">

<h1>✨ Surprise ✨</h1>

<p>
Today isn't just another day...<br><br>

It's the day my favourite person came into this world. ❤️
</p>

<button onclick="showVault()">Continue 🎁</button>

</div>

<script>

for(let i=0;i<120;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

star.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(star);

}

function nextPage(){

document.getElementById("page1").classList.add("hidden");

document.getElementById("page2").classList.remove("hidden");

}

function showVault(){

alert("🎁 The Memory Vault is coming in Part 2 ❤️");

}

</script>

</body>
</html>
